name: cat_vs_zombies
description: Cat vs Zombies - Lulu and Gute Runner Game!
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.1.2
  audioplayers: ^6.0.0
  http: ^1.2.0
  timezone: ^0.9.2
  permission_handler: ^11.3.0
  # Adicionado para o E-book:
  flutter_inappwebview: ^6.0.0
  # Adicionado para o jogo Runner com Flame:
  flame: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

